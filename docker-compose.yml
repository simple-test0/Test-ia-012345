services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
      - API_TOKEN=${API_TOKEN:-}
    volumes:
      - ./data:/app/../data
    depends_on:
      - ollama
    # For GPU: install the NVIDIA Container Toolkit and uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

volumes:
  ollama:
