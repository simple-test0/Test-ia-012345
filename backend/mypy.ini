[mypy]
python_version = 3.11
files = .
exclude = migrations/

# Practicality: most AI/ML deps ship without stubs
ignore_missing_imports = True

# Catch real bugs without being too noisy on existing code
check_untyped_defs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_return_any = False
no_implicit_optional = True
strict_equality = True

# New code should be fully annotated — enforced by pre-commit, not CI for now
; disallow_untyped_defs = True   # uncomment once existing code is annotated

# Per-module overrides for third-party stubs that are known-missing
[mypy-ddgs.*]
ignore_missing_imports = True

[mypy-diffusers.*]
ignore_missing_imports = True

[mypy-torch.*]
ignore_missing_imports = True

[mypy-transformers.*]
ignore_missing_imports = True

[mypy-PIL.*]
ignore_missing_imports = True

[mypy-huggingface_hub.*]
ignore_missing_imports = True

[mypy-aiosqlite.*]
ignore_missing_imports = True
