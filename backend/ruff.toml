target-version = "py311"
# 120 keeps dense data tables (architecture param schemas, model registry rows)
# on one readable line while still catching genuinely runaway lines.
line-length = 120

# pycodestyle errors+warnings (E/W), pyflakes (F), import sorting (I),
# bugbear (B), comprehensions (C4), simplify (SIM) and pyupgrade (UP).
[lint]
select = ["E", "W", "F", "I", "B", "C4", "SIM", "UP"]

[lint.flake8-bugbear]
# FastAPI uses these callables as argument defaults by design (B008).
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Query",
    "fastapi.Path",
    "fastapi.Header",
    "fastapi.Body",
    "fastapi.Form",
    "fastapi.File",
]

[lint.per-file-ignores]
# Migrations are autogenerated.
"migrations/**" = ["E", "W", "F", "I", "B", "C4", "SIM", "UP"]
# Tests use assert-heavy patterns, broad raises (B017) for connection-rejection
# checks, and local imports for optional-dep gating.
"tests/**" = ["B011", "B017", "E402"]
