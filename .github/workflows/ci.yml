name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install runtime + dev deps (light subset, no torch)
        run: |
          python -m pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" python-multipart \
            sqlalchemy aiosqlite pydantic pydantic-settings \
            huggingface-hub psutil ddgs httpx pillow
          pip install -r requirements-dev.txt
          pip install ruff
      - name: Lint (ruff)
        run: ruff check .
      - name: Run tests
        run: pytest -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
